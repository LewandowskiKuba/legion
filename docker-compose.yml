services:
  # ── PostgreSQL + pgvector ──────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: legion-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: legion
      POSTGRES_USER: legion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/db-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legion -d legion"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (Node.js) ──────────────────────────────────────────────────────
  backend:
    build: .
    container_name: legion-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PORT: 3000
      DATABASE_URL: postgresql://legion:${POSTGRES_PASSWORD}@postgres:5432/legion
    volumes:
      - legion-data:/app/data
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "3000"

  # ── Nginx (reverse proxy + static frontend) ────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: legion-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-webroot:/var/www/certbot:ro
      - certbot-certs:/etc/letsencrypt:ro
    depends_on:
      - backend

  # ── Certbot (HTTPS, odpal raz manualnie) ──────────────────────────────────
  certbot:
    image: certbot/certbot
    container_name: legion-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - certbot-certs:/etc/letsencrypt
    profiles:
      - certbot   # docker compose --profile certbot run certbot ...

volumes:
  postgres-data:
  legion-data:
  certbot-webroot:
  certbot-certs:
