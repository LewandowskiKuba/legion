# ── We Are Legion – nginx config ──────────────────────────────────────────────

# HTTP → redirect do HTTPS
server {
    listen 80;
    server_name simulation.kubalewandowski.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS – Cloudflare Origin Certificate
server {
    listen 443 ssl;
    server_name simulation.kubalewandowski.com;

    ssl_certificate /etc/nginx/certs/cloudflare-origin.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare-origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Frontend (React SPA) – serwowany statycznie pod /adstest
    location /adstest/ {
        alias /usr/share/nginx/html/adstest/;
        try_files $uri $uri/ index.html;

        # Cache statycznych assetów (JS/CSS z hashem)
        location ~* \.(js|css|png|jpg|svg|woff2|ico)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # Redirect głównej strony do /adstest
    location = / {
        return 302 /adstest/;
    }

    # API – proxy do backendu
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;

        # SSE support (długie połączenia bez buforowania)
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering "no";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeout dla długich symulacji (40 min)
        proxy_read_timeout 2400s;
        proxy_send_timeout 2400s;
    }

    # SPA catch-all – nieznane ścieżki → redirect do /adstest/
    location / {
        return 302 /adstest/;
    }

    # Blokuj dostęp do wrażliwych plików
    location ~ /\. {
        deny all;
    }
}
